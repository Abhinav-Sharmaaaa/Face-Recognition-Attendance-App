<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>Registered Students</h1>
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Branch</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for name, data in students.items() %}
                <tr>
                    <td>{{ name }}</td>
                    <td>{{ data['branch'] }}</td>
                    <td>
                        <form action="{{ url_for('remove_student', name=name) }}" method="post" style="display:inline;">
                            <button class="delete-button" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <a href="/">Back to Home</a>
</body>
</html>
